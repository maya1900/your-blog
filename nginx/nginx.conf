# Prod nginx config for 墨记
# - SPA fallback to /index.html
# - /api  → proxy_pass to the `server` service (docker-compose internal network)
# - /uploads → served straight off the shared named volume (read-only mount)

server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src https://www.youtube.com https://player.bilibili.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

    # Slightly larger than the server's 5 MB upload limit so the body reaches Express
    # and gets a proper 413 JSON response instead of an nginx-generated HTML one.
    client_max_body_size 6m;

    root /usr/share/nginx/html;
    index index.html;

    # SPA index — never cache, so deploys roll out instantly.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # Hashed static assets — long immutable cache.
    location ~* \.(?:js|mjs|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # User uploads — served directly by nginx off the shared volume.
    # `^~` outranks the regex location above; without it, /uploads/*.jpg falls
    # into the static-asset regex and tries to serve from the SPA root → 404.
    location ^~ /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API reverse proxy.
    location /api/ {
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Public metadata generated by Express.
    location ~ ^/(rss\.xml|sitemap\.xml|robots\.txt)$ {
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
