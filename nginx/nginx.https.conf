# HTTPS-enabled nginx config for 墨记
#
# 启用方式:配合 docker-compose.https.yml overlay 使用
#   docker compose -f docker-compose.prod.yml -f docker-compose.https.yml \
#     --env-file .env.production up -d
#
# 前置:
#   ./certs/fullchain.pem    — 证书链(含中间证书)
#   ./certs/privkey.pem      — 私钥
# 文件缺失 nginx 启动会直接报错。

# ---- 80 端口:全量重定向到 https,放行 ACME http-01 challenge ----
server {
    listen 80;
    server_name _;

    # certbot --webroot 续期路径;目录不存在时本 location 自然 404,无副作用
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 443 端口:HTTPS 主服务 ----
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 现代 TLS:只开 1.2 + 1.3,禁用旧协议
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS — 1 年 + 子域。首次部署不确定时可注释掉,确认稳定后再开
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 与 HTTP 版一致:略大于 server 的 5MB 上限,让 413 由 Express 出 JSON
    client_max_body_size 6m;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /index.html =404;
    }

    location ~* \.(?:js|mjs|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # `^~` outranks the static-asset regex above; without it, /uploads/*.jpg
    # falls into that regex and tries to serve from the SPA root → 404.
    location ^~ /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /api/ {
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
